<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your TechCorp Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #667eeadd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .logo p { color: #666; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .warning { background: #fef3cd; border: 1px solid #ffc107; color: #856404; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; }
        .hidden { display: none; }
        .otp-input-group { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .otp-input { width: 50px !important; height: 50px; text-align: center; font-size: 24px; font-weight: bold; padding: 0 !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN PAGE -->
        <div id="loginPage">
            <div class="logo">
                <h1>🔒 Verify Your TechCorp Identity</h1>
                <p>Secure your account</p>
            </div>
            <div class="warning">⚠️ For security reasons, please verify your identity.</div>
            <form id="loginForm">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@company.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+1234567890">
                </div>

                <button type="submit">Verify Account</button>
            </form>
        </div>
        
        <!-- OTP PAGE -->
        <div id="otpPage" class="hidden">
            <div class="logo">
                <h1>✓ Enter Security Code</h1>
                <p>Enter the code sent to your email</p>
            </div>
            <form id="otpForm">
                <div class="form-group">
                    <label>Enter 6-Digit Code</label>
                    <div class="otp-input-group">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    </div>
                </div>
                <button type="submit">Verify Code</button>
            </form>
        </div>
    </div>
    
    <script src="/phishguard-tracker.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
    
        if (token) {
            // Track page visit using pixel
            const img1 = new Image();
            img1.src = `http://127.0.0.1:8000/api/v1/capture/pixel/${token}?event=page_visited`;
            document.body.appendChild(img1);
        }
    
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
        
            // Track credentials via pixel
            if (token) {
                const img = new Image();
                img.src = `http://127.0.0.1:8000/api/v1/capture/pixel/${token}?event=credentials_submitted`;
                document.body.appendChild(img);
            }
        
            // Transition to OTP
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('otpPage').classList.remove('hidden');
        });
    
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, i) => {
            input.addEventListener('input', function() {
                if (input.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
            });
        });
    
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
        
            // Track OTP via pixel
            if (token) {
                const img = new Image();
                img.src = `http://127.0.0.1:8000/api/v1/capture/pixel/${token}?event=otp_captured`;
                document.body.appendChild(img);
            }
        
            alert('✓ Account verified!\n\nThis is a security awareness training exercise.');
        
            // Reset
            document.getElementById('loginForm').reset();
            otpInputs.forEach(i => i.value = '');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('otpPage').classList.add('hidden');
        });
    </script>
</body>
</html>
