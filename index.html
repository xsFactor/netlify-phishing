<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 13px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .warning {
            background: #fef3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        
        .otp-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .otp-input {
            width: 50px !important;
            height: 50px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 0 !important;
        }
        
        .hidden {
            display: none;
        }
        
        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .loading {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 8px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN PAGE -->
        <div id="loginPage">
            <div class="logo">
                <h1>🔒 Account Verification</h1>
                <p>Secure your account</p>
            </div>
            
            <div class="warning">
                ⚠️ For security reasons, please verify your identity to continue.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit">Verify Account</button>
            </form>
            
            <div class="footer">
                © 2026 Company Security. All rights reserved.
            </div>
        </div>
        
        <!-- OTP PAGE -->
        <div id="otpPage" class="hidden">
            <div class="logo">
                <h1>✓ Verification Code</h1>
                <p>Enter the code sent to your email</p>
            </div>
            
            <div id="successMessage" class="success-message hidden">
                Verification code sent to <strong id="emailDisplay"></strong>
            </div>
            
            <form id="otpForm">
                <div class="form-group">
                    <label>Enter 6-Digit Code</label>
                    <div class="otp-input-group">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5">
                    </div>
                </div>
                
                <button type="submit" id="otpSubmitBtn">Verify Code</button>
            </form>
            
            <div class="footer">
                Didn't receive a code? <a href="#" id="resendBtn" style="color: #667eea; text-decoration: none;">Resend</a>
            </div>
        </div>
    </div>
    
    <!-- PhishGuard Tracking Script -->
    <script src="/phishguard-tracker.js"></script>
    <script>
        // Initialize PhishGuard tracking
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        if (token) {
            PhishGuard.init({
                baseURL: 'http://127.0.0.1:8000/api/v1',
                autoTrack: true,
                debug: true
            });
        }
        
        // Track page visit
        if (token) {
            PhishGuard.trackEvent('page_visited', {
                page: 'login',
                timestamp: new Date().toISOString()
            });
        }
        
        // LOGIN PAGE LOGIC
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Track credentials
            if (token) {
                PhishGuard.trackEvent('credentials_entered', {
                    hasEmail: true,
                    hasPassword: true,
                    emailLength: email.length
                });
            }
            
            // Show OTP page
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('otpPage').classList.remove('hidden');
            document.getElementById('emailDisplay').textContent = email;
            document.getElementById('successMessage').classList.remove('hidden');
            
            // Track page transition
            if (token) {
                PhishGuard.trackEvent('page_transition', {
                    from: 'login',
                    to: 'otp'
                });
            }
        });
        
        // OTP PAGE LOGIC
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                // Track OTP entry
                const fullOtp = Array.from(otpInputs).map(i => i.value).join('');
                if (fullOtp.length > 0 && token) {
                    PhishGuard.trackEvent('otp_entry', {
                        otpLength: fullOtp.length
                    });
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });
        
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            
            if (otp.length !== 6) {
                alert('Please enter a 6-digit code');
                return;
            }
            
            // Track OTP submission
            if (token) {
                PhishGuard.trackEvent('otp_submitted', {
                    otpLength: 6
                });
            }
            
            // Disable button and show loading
            const btn = document.getElementById('otpSubmitBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            
            // Simulate verification delay
            setTimeout(() => {
                if (token) {
                    PhishGuard.trackEvent('verification_complete', {
                        success: true
                    });
                }
                
                alert('✓ Your account has been verified!\n\nNote: This is a security awareness training exercise.');
                
                // Reset form
                document.getElementById('loginForm').reset();
                otpInputs.forEach(i => i.value = '');
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('otpPage').classList.add('hidden');
                document.getElementById('successMessage').classList.add('hidden');
                btn.classList.remove('loading');
                btn.disabled = false;
            }, 1500);
        });
        
        document.getElementById('resendBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (token) {
                PhishGuard.trackEvent('resend_otp', {
                    timestamp: new Date().toISOString()
                });
            }
            alert('OTP code has been resent to your email.');
        });
    </script>
</body>
</html>
